# @BelongsProject: FamilyAiButler
# @BelongsPackage: ops.docker-compose
# @ClassName: docker-compose
# @Author: atluofu
# @CreateTime: 2026Year-05Month-19Day
# @Description: 本地 Docker Compose 编排
# @Version: 1.0
x-backend-common-environment: &backend-common-environment
  SPRING_PROFILES_ACTIVE: dev
  FAMILY_AI_BUTLER_LOG_PATH: ${FAMILY_AI_BUTLER_LOG_PATH:-/var/log/family-ai-butler}
  JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75 -Djava.security.egd=file:/dev/./urandom -Djava.io.tmpdir=/tmp}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-familyaibutler}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-HomeLab666}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-HomeLab666}
  NACOS_SERVER_ADDR: nacos:8848
  NACOS_USERNAME: ${NACOS_USERNAME:-test}
  NACOS_PASSWORD: ${NACOS_PASSWORD:-HomeLab666}
  NACOS_NAMESPACE: ${NACOS_NAMESPACE:-d11babcf-8ebf-47fb-90a6-3fb6a7eb85dc}
  FAMILY_AI_BUTLER_ENV: ${FAMILY_AI_BUTLER_ENV:-dev}
  UAA_AUTHORIZATION_BASE_URL: ${UAA_AUTHORIZATION_BASE_URL:-http://family-uaa:39092}

services:
  family-web:
    build:
      context: ../..
      dockerfile: ops/docker-compose/Dockerfile.frontend
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-/api}
    image: ${IMAGE_REGISTRY:-family-ai-butler}/family-web:${IMAGE_TAG:-local}
    container_name: family-ai-butler-web
    environment:
      NGINX_API_PREFIX: ${NGINX_API_PREFIX:-/api}
      NGINX_GATEWAY_PROXY: ${NGINX_GATEWAY_PROXY:-http://host.docker.internal:9527}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 12

  postgres:
    image: postgres:17-alpine
    container_name: family-ai-butler-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-familyaibutler}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-HomeLab666}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:8-alpine
    container_name: family-ai-butler-redis
    command: [ "sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"" ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-HomeLab666}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 12

  nacos:
    image: nacos/nacos-server:v3.1.0
    container_name: family-ai-butler-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-change-me}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-security}
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/actuator/health >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 18

  family-core:
    profiles:
      - backend
    build:
      context: ../../backend
      dockerfile: ../ops/docker-compose/Dockerfile.backend
      args:
        JAR_FILE: family-core/target/family-core-0.0.1-SNAPSHOT.jar
    image: ${IMAGE_REGISTRY:-family-ai-butler}/family-core:${IMAGE_TAG:-local}
    environment:
      <<: *backend-common-environment
      REDIS_DATABASE: 1
    ports:
      - "39090:39090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:39090/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 18

  family-uaa:
    profiles:
      - backend
    build:
      context: ../../backend
      dockerfile: ../ops/docker-compose/Dockerfile.backend
      args:
        JAR_FILE: family-uaa/uaa-core/target/uaa-core-0.0.1-SNAPSHOT.jar
    image: ${IMAGE_REGISTRY:-family-ai-butler}/family-uaa:${IMAGE_TAG:-local}
    environment:
      <<: *backend-common-environment
    ports:
      - "39092:39092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:39092/.well-known/jwks.json || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 18

  family-ai-qwen:
    profiles:
      - backend
    build:
      context: ../../backend
      dockerfile: ../ops/docker-compose/Dockerfile.backend
      args:
        JAR_FILE: family-ai/qwen-ai/target/qwen-ai-0.0.1-SNAPSHOT.jar
    image: ${IMAGE_REGISTRY:-family-ai-butler}/family-ai-qwen:${IMAGE_TAG:-local}
    environment:
      <<: *backend-common-environment
      AI_QWEN_KEY: ${AI_QWEN_KEY:-replace-with-your-key}
    ports:
      - "39091:39091"
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:39091/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 18

  family-gateway:
    profiles:
      - backend
    build:
      context: ../../backend
      dockerfile: ../ops/docker-compose/Dockerfile.backend
      args:
        JAR_FILE: family-gateway/target/family-gateway-0.0.1-SNAPSHOT.jar
    image: ${IMAGE_REGISTRY:-family-ai-butler}/family-gateway:${IMAGE_TAG:-local}
    environment:
      <<: *backend-common-environment
      REDIS_DATABASE: 2
    ports:
      - "9527:9527"
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      family-core:
        condition: service_started
      family-uaa:
        condition: service_started
      family-ai-qwen:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9527/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  postgres-data:
  redis-data:
  nacos-data:
