# @BelongsPackage: ops.nginx
# @ClassName: family-ai-butler.local
# @Author: atluofu
# @CreateTime: 2026Year-05Month-19Day
# @Description: 本机 Nginx 前端静态资源托管和后端网关代理 server 模板
# @Version: 1.0
server {
    listen ${NGINX_LISTEN_PORT};
    server_name _;

    root ${NGINX_WEB_ROOT};
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ${NGINX_API_PREFIX}/ {
        rewrite ^${NGINX_API_PREFIX}(/.*)$ $1 break;
        proxy_pass ${NGINX_GATEWAY_PROXY};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(base|uaa|ai)(/|$) {
        return 404;
    }
}
