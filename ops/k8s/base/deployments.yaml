apiVersion: apps/v1
kind: Deployment
metadata:
  name: family-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: family-web
  template:
    metadata:
      labels:
        app: family-web
    spec:
      containers:
        - name: family-web
          image: family-ai-butler/family-web:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: family-web-nginx-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: family-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: family-core
  template:
    metadata:
      labels:
        app: family-core
    spec:
      containers:
        - name: family-core
          image: family-ai-butler/family-core:latest
          ports:
            - containerPort: 39090
          envFrom:
            - configMapRef:
                name: family-ai-butler-config
            - secretRef:
                name: family-ai-butler-secret
