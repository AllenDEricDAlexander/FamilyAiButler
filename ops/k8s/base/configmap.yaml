# @Author: atluofu
# @CreateTime: 2026Year-05Month-19Day
# @Description: 服务公共配置
# @Version: 1.0
apiVersion: v1
kind: ConfigMap
metadata:
  name: family-ai-butler-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  FAMILY_AI_BUTLER_ENV: "prod"
  FAMILY_AI_BUTLER_LOG_PATH: "/var/log/family-ai-butler"
  JAVA_OPTS: "-XX:MaxRAMPercentage=75 -Djava.security.egd=file:/dev/./urandom -Djava.io.tmpdir=/tmp"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "familyaibutler"
  POSTGRES_USER: "postgres"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  NACOS_SERVER_ADDR: "nacos:8848"
  NACOS_USERNAME: "test"
  NACOS_NAMESPACE: "default"
  UAA_AUTHORIZATION_BASE_URL: "http://family-uaa:39092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: family-web-nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;
        charset utf-8;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://family-gateway:9527;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(base|uaa|ai)(/|$) {
            return 404;
        }
    }
