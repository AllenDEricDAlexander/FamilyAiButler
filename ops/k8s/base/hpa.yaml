# @BelongsProject: FamilyAiButler
# @BelongsPackage: ops.k8s.base
# @ClassName: hpa
# @Author: atluofu
# @CreateTime: 2026Year-05Month-21Day
# @Description: 无状态服务水平伸缩配置
# @Version: 1.0
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: family-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: family-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: family-core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: family-core
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
