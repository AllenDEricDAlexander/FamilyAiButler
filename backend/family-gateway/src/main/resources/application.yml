server:
  port: 9527

spring:
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:2}
      timeout: 30000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

family-gateway:
  jwt:
    ignoreUrlSet:
      - /uaa/user/login
      - /uaa/user/register
      - /uaa/user/refresh
      - /openapi-console/**

family:
  security:
    jwt:
      enabled: true
      authorization-header: ${JWT_AUTHORIZATION_HEADER:Authorization}
      token-prefix: ${JWT_TOKEN_PREFIX:}
      access-key: ${JWT_ACCESS_KEY:BWvIZZhY5+IKEcZRkEKz8Pf8qnZO+4FVpCRPKMy+vVgvqmN9ZxEWi7I2iuFdWdG1OePjAp4ih7IQpedEhj1IVg==}
      refresh-key: ${JWT_REFRESH_KEY:RXnNs+kEjjl+eaypNkK7QKb5i/mbpi2vi5VBUeor7GrlLBV/XcEsoOtHqqtLq4no8FZPOObT49l1gqMui64LoA==}
      access-token-expire-time: ${JWT_ACCESS_TOKEN_EXPIRE_TIME:300000}
      refresh-token-expire-time: ${JWT_REFRESH_TOKEN_EXPIRE_TIME:2592000000}

egon:
  openapi:
    console:
      enabled: ${OPENAPI_CONSOLE_ENABLED:true}
      mode: ${OPENAPI_CONSOLE_MODE:auto}
      base-path: /openapi-console
      title: FamilyAiButler API Debug Console
      environment: ${FAMILY_AI_BUTLER_ENV:dev}
      auth:
        username: ${OPENAPI_CONSOLE_USERNAME:admin}
        password: ${OPENAPI_CONSOLE_PASSWORD:{sha256}7bb2941643fcee3a190d402136de9b3b8f650a58e76177681bf74e990ddf833b}
        session-secret: ${OPENAPI_CONSOLE_SESSION_SECRET:2b51b70dd6c7275cecb23dc2f9ac49a9b3e327dbb1cfc2857a45ab156120031c}
        secure-cookie: ${OPENAPI_CONSOLE_SECURE_COOKIE:false}
        ttl: 8h
      producer:
        enabled: false
      signing:
        enabled: ${OPENAPI_CONSOLE_SIGNING_ENABLED:false}
        algorithm: HmacSHA256
        access-key-id: ${OPENAPI_CONSOLE_SIGNING_ACCESS_KEY:family-ai-butler}
        secret: ${OPENAPI_CONSOLE_SIGNING_SECRET:FamilyAiButlerOpenApiSigningSecretChangeMe}
      client:
        engine: ${OPENAPI_CONSOLE_CLIENT_ENGINE:AUTO}
        max-connections: ${OPENAPI_CONSOLE_CLIENT_MAX_CONNECTIONS:200}
        pending-acquire-max-count: ${OPENAPI_CONSOLE_CLIENT_PENDING_ACQUIRE_MAX_COUNT:500}
        pending-acquire-timeout: ${OPENAPI_CONSOLE_CLIENT_PENDING_ACQUIRE_TIMEOUT:5s}
        connect-timeout: ${OPENAPI_CONSOLE_CLIENT_CONNECT_TIMEOUT:3s}
        response-timeout: ${OPENAPI_CONSOLE_CLIENT_RESPONSE_TIMEOUT:30s}
        max-idle-time: ${OPENAPI_CONSOLE_CLIENT_MAX_IDLE_TIME:30s}
        max-life-time: ${OPENAPI_CONSOLE_CLIENT_MAX_LIFE_TIME:5m}
        compression-enabled: ${OPENAPI_CONSOLE_CLIENT_COMPRESSION_ENABLED:true}
        wiretap: ${OPENAPI_CONSOLE_CLIENT_WIRETAP:false}
      load-test:
        enabled: ${OPENAPI_CONSOLE_LOAD_TEST_ENABLED:true}
        max-requests: ${OPENAPI_CONSOLE_LOAD_TEST_MAX_REQUESTS:50}
        max-concurrency: ${OPENAPI_CONSOLE_LOAD_TEST_MAX_CONCURRENCY:5}
        max-active-runs: ${OPENAPI_CONSOLE_LOAD_TEST_MAX_ACTIVE_RUNS:2}
        max-active-concurrency: ${OPENAPI_CONSOLE_LOAD_TEST_MAX_ACTIVE_CONCURRENCY:50}
        reject-when-busy: ${OPENAPI_CONSOLE_LOAD_TEST_REJECT_WHEN_BUSY:true}
      export:
        enabled: ${OPENAPI_CONSOLE_EXPORT_ENABLED:true}
      services:
        - id: family-core
          name: 家庭核心服务
          group: 业务服务
          open-api-url: http://family-core/v3/api-docs
          open-api-access-token: ${OPENAPI_DOCS_ACCESS_TOKEN:656fe343d39f0ff1236c40b81a787258a4f633fd348fe04a9b2c77eabb652f45}
          base-url: http://family-core
          order: 10
        - id: family-uaa
          name: 用户认证服务
          group: 基础服务
          open-api-url: http://family-uaa/v3/api-docs
          open-api-access-token: ${OPENAPI_DOCS_ACCESS_TOKEN:656fe343d39f0ff1236c40b81a787258a4f633fd348fe04a9b2c77eabb652f45}
          base-url: http://family-uaa
          order: 20
        - id: family-ai-qwen
          name: Qwen AI 服务
          group: AI 服务
          open-api-url: http://family-ai-qwen/v3/api-docs
          open-api-access-token: ${OPENAPI_DOCS_ACCESS_TOKEN:656fe343d39f0ff1236c40b81a787258a4f633fd348fe04a9b2c77eabb652f45}
          base-url: http://family-ai-qwen
          order: 30
