server:
  port: 9527

spring:
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:2}
      timeout: 30000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

family-gateway:
  jwt:
    ignoreUrlSet:
      - /user/login
      - /user/register
      - /user/refresh
      - /openapi-console
      - /v3/api-docs
    authorization: Authorization
    accessKey: MTIzNDU2
    refresh-key: MTIzNDU2
    access-token-expire-time: 300000
    refresh-token-expire-time: 2592000000

egon:
  openapi:
    console:
      enabled: ${OPENAPI_CONSOLE_ENABLED:true}
      mode: ${OPENAPI_CONSOLE_MODE:auto}
      base-path: /openapi-console
      title: FamilyAiButler API Debug Console
      environment: ${FAMILY_AI_BUTLER_ENV:dev}
      auth:
        username: ${OPENAPI_CONSOLE_USERNAME:admin}
        password: ${OPENAPI_CONSOLE_PASSWORD:OpenApi@123456}
        session-secret: ${OPENAPI_CONSOLE_SESSION_SECRET:FamilyAiButlerOpenApiConsoleSecretChangeMe}
        secure-cookie: ${OPENAPI_CONSOLE_SECURE_COOKIE:false}
        ttl: 8h
      producer:
        enabled: false
      signing:
        enabled: ${OPENAPI_CONSOLE_SIGNING_ENABLED:false}
        algorithm: HmacSHA256
        access-key-id: ${OPENAPI_CONSOLE_SIGNING_ACCESS_KEY:family-ai-butler}
        secret: ${OPENAPI_CONSOLE_SIGNING_SECRET:FamilyAiButlerOpenApiSigningSecretChangeMe}
      load-test:
        enabled: ${OPENAPI_CONSOLE_LOAD_TEST_ENABLED:true}
        max-requests: ${OPENAPI_CONSOLE_LOAD_TEST_MAX_REQUESTS:200}
        max-concurrency: ${OPENAPI_CONSOLE_LOAD_TEST_MAX_CONCURRENCY:20}
      export:
        enabled: ${OPENAPI_CONSOLE_EXPORT_ENABLED:true}
      services:
        - id: family-core
          name: 家庭核心服务
          group: 业务服务
          open-api-url: http://family-core/v3/api-docs
          base-url: http://family-core
          order: 10
        - id: family-uaa
          name: 用户认证服务
          group: 基础服务
          open-api-url: http://family-uaa/v3/api-docs
          base-url: http://family-uaa
          order: 20
        - id: family-ai-qwen
          name: Qwen AI 服务
          group: AI 服务
          open-api-url: http://family-ai-qwen/v3/api-docs
          base-url: http://family-ai-qwen
          order: 30
