server:
  port: 39091
  http2:
    enabled: true
  servlet:
    context-path: /
    encoding:
      enabled: true
      force: true
      charset: UTF-8
  tomcat:
    uri-encoding: UTF-8
    max-swallow-size: -1
    max-connections: 10000
    accept-count: 1000
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-keep-alive-requests: 100
    keep-alive-timeout: 10000
    accesslog:
      enabled: true
      directory: ${FAMILY_AI_BUTLER_LOG_PATH:./logs}/${spring.application.name}
      prefix: access_log
      suffix: .log
      encoding: utf-8

spring:
  main:
    banner-mode: off
  profiles:
    active: dev
  datasource:
    hikari:
      connection-timeout: 2000
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 200000
      auto-commit: true
      max-lifetime: 1800000
      connection-test-query: select 1
      pool-name: FamilyHikariCP
      validation-timeout: 3000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: always
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      indent-output: true
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            schema: classpath:/schema.sql
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2000
        multiplier: 2
        max-interval: 5000
      on-client-errors: false
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_QWEN_KEY:replace-with-your-key}
  #    deepseek:
  #      api-key: ${AI_DEEP_SEEK_KEY}
  #      chat:
  #        options:
  #          model: deepseek-chat
  #    zhipuai:
  #      api-key: ${AI_ZHI_PU_KEY}
  cloud:
    nacos:
      username: ${NACOS_USERNAME:test}
      password: ${NACOS_PASSWORD:HomeLab666}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:d11babcf-8ebf-47fb-90a6-3fb6a7eb85dc}

egon:
  openapi:
    console:
      producer:
        enabled: true
        title: FamilyAiButler Qwen AI API
        description: Qwen AI 服务接口
        version: v0.0.1
        contact-name: Egon
        contact-url: https://github.com/AllenDEricDAlexander/FamilyAiButler
        contact-email: mqa010225@gmail.com
        license-name: MIT License
        license-url: https://opensource.org/licenses/MIT
        access-control:
          enabled: true
          token: ${OPENAPI_DOCS_ACCESS_TOKEN:656fe343d39f0ff1236c40b81a787258a4f633fd348fe04a9b2c77eabb652f45}

family:
  uaa:
    resource-server:
      enabled: ${UAA_RESOURCE_SERVER_ENABLED:true}
      service-name: family-ai-qwen
      authorization-base-url: ${UAA_AUTHORIZATION_BASE_URL:http://127.0.0.1:39092}
      permit-patterns:
        - /actuator/**
        - /v3/api-docs/**
        - /openapi-console/**
  ai:
    qwen:
      api-key: ${AI_QWEN_KEY:replace-with-your-key}
      models:
        - name: qwen-plus
          display-name: 通义千问 Plus
          enabled: true
          provider: dashscope
          model-kind: CHAT
          modalities:
            - TEXT
            - TEXT_GENERATION
          default-modalities:
            - TEXT
            - TEXT_GENERATION
          aliases:
            - text-default
          options:
            temperature: 0.7
        - name: qwen-vl-plus
          display-name: 通义千问 VL-Plus
          enabled: true
          provider: dashscope
          model-kind: MULTIMODAL_CHAT
          modalities:
            - MULTIMODAL
            - VISION
            - VISION_UNDERSTANDING
          default-modalities:
            - VISION_UNDERSTANDING
          aliases:
            - qwen-vl
            - vision-default
          options:
            temperature: 0.2
        - name: qwen-omni-turbo
          display-name: 通义千问 Omni Turbo
          enabled: true
          provider: dashscope
          model-kind: OMNI_CHAT
          modalities:
            - OMNI
            - REALTIME
            - REALTIME_OMNI
          default-modalities:
            - OMNI
          aliases:
            - qwen-omni
            - omni-default
          options:
            temperature: 0.7
            dashscope-modalities:
              - text
              - audio

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  file:
    path: ${FAMILY_AI_BUTLER_LOG_PATH:./logs}/${spring.application.name}
#  config: classpath:log/logback-spring.xml
