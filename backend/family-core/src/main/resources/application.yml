server:
  port: 39090
  http2:
    enabled: true
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    max-swallow-size: -1
    max-connections: 10000
    accept-count: 1000
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-keep-alive-requests: 100
    keep-alive-timeout: 10000
    accesslog:
      enabled: true
      directory: ${FAMILY_AI_BUTLER_LOG_PATH:./logs}/${spring.application.name}
      prefix: access_log
      suffix: .log
      encoding: utf-8

spring:
  main:
    banner-mode: off
  cache:
    type: none
  profiles:
    active: dev
  application:
    name: family-core
  datasource:
    hikari:
      connection-timeout: 2000
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 200000
      auto-commit: true
      max-lifetime: 1800000
      connection-test-query: select 1
      pool-name: FamilyHikariCP
      validation-timeout: 3000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: always
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      indent-output: true
    time-zone: GMT+8
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
      password: ${REDIS_PASSWORD:HomeLab666}
      timeout: 30000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1
          max-idle: 8
          min-idle: 0
  cloud:
    nacos:
      username: ${NACOS_USERNAME:test}
      password: ${NACOS_PASSWORD:HomeLab666}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:d11babcf-8ebf-47fb-90a6-3fb6a7eb85dc}

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    banner: false
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false
  type-aliases-package: top.egon.familyaibutler.family.enums

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: top.egon.familyaibutler.family

egon:
  openapi:
    console:
      producer:
        enabled: true
        title: FamilyAiButler Core API
        description: 家庭核心服务接口
        version: v0.0.1
        contact-name: Egon
        contact-url: https://github.com/AllenDEricDAlexander/FamilyAiButler
        contact-email: mqa010225@gmail.com
        license-name: MIT License
        license-url: https://opensource.org/licenses/MIT
        access-control:
          enabled: true
          token: ${OPENAPI_DOCS_ACCESS_TOKEN:656fe343d39f0ff1236c40b81a787258a4f633fd348fe04a9b2c77eabb652f45}

logging:
  file:
    path: ${FAMILY_AI_BUTLER_LOG_PATH:./logs}/${spring.application.name}
  config: classpath:log/logback-spring.xml
